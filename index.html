<script>
const LEVELS = [
  { name:'Level 1', words:[
    {kanji:'花',reading:'はな',romaji:'hana',meaning:'꽃',category:'자연'},
    {kanji:'犬',reading:'いぬ',romaji:'inu',meaning:'개',category:'동물'},
    {kanji:'猫',reading:'ねこ',romaji:'neko',meaning:'고양이',category:'동물'},
    {kanji:'水',reading:'みず',romaji:'mizu',meaning:'물',category:'자연'},
    {kanji:'火',reading:'ひ',romaji:'hi',meaning:'불',category:'자연'},
    {kanji:'山',reading:'やま',romaji:'yama',meaning:'산',category:'자연'},
    {kanji:'川',reading:'かわ',romaji:'kawa',meaning:'강',category:'자연'},
    {kanji:'空',reading:'そら',romaji:'sora',meaning:'하늘',category:'자연'},
    {kanji:'月',reading:'つき',romaji:'tsuki',meaning:'달',category:'자연'},
    {kanji:'星',reading:'ほし',romaji:'hoshi',meaning:'별',category:'자연'},
  ]},
  // ... (Level 2~4는 그대로 유지)
  { name:'Level 4', words:[
    {kanji:'学校',reading:'がっこう',romaji:'gakkou',meaning:'학교',category:'장소'},
    {kanji:'駅',reading:'えき',romaji:'eki',meaning:'역',category:'장소'},
    {kanji:'本',reading:'ほん',romaji:'hon',meaning:'책',category:'물건'},
    {kanji:'車',reading:'くるま',romaji:'kuruma',meaning:'자동차',category:'탈것'},
    {kanji:'電車',reading:'でんしゃ',romaji:'densha',meaning:'전철',category:'탈것'},
    {kanji:'カーペット',reading:'かーぺっと',romaji:'kaapetto',meaning:'카펫',category:'물건'},
    {kanji:'テレビ',reading:'てれび',romaji:'terebi',meaning:'텔레비전',category:'물건'},
    {kanji:'電話',reading:'でんわ',romaji:'denwa',meaning:'전화',category:'물건'},
    {kanji:'食べ物',reading:'たべもの',romaji:'tabemono',meaning:'음식',category:'음식'},
    {kanji:'友達',reading:'ともだち',romaji:'tomodachi',meaning:'친구',category:'사람'},
  ]},
];

const PASS_RATE = 0.8;
const PASS_MIN = 10;

function loadProgress() {
  try { return JSON.parse(localStorage.getItem('jp_progress') || '{}'); }
  catch(e) { return {}; }
}
function saveProgress(p) { localStorage.setItem('jp_progress', JSON.stringify(p)); }

function getUnlockedLevel() {
  const p = loadProgress();
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (p['level_' + i] && p['level_' + i].passed) return Math.min(i + 1, LEVELS.length - 1);
  }
  return 0;
}

let currentLevel = 0;
let WORDS = LEVELS[0].words;
let currentWord, currentChoices, answered = false;
let combo = 0, correctCount = 0, wrongCount = 0, streakCount = 0;
let mode = 'hira2meaning';
let usedWords = [], totalShown = 0;
let levelCorrect = 0, levelTotal = 0;

const AZURE_TTS_KEY = '8RGgLixORTXotPKIAxlKk1uWfLJpwoC97nfJpL1Ra2V56f9oscBIJQQJ99CEACNns7RXJ3w3AAAYACOGJUFu';
const AZURE_REGION = 'koreacentral';

async function speakWord(text) {
  const txt = text || currentWord?.reading;
  if (!txt) return;
  try {
    const tokenRes = await fetch(
      `https://${AZURE_REGION}.api.cognitive.microsoft.com/sts/v1.0/issueToken`,
      { method: 'POST', headers: {'Ocp-Apim-Subscription-Key': AZURE_TTS_KEY} }
    );
    const token = await tokenRes.text();

    const ssml = `<speak version='1.0' xml:lang='ja-JP'>
      <voice name='ja-JP-NanamiNeural'>
        <prosody rate='-10%'>${txt}</prosody>
      </voice>
    </speak>`;

    const audioRes = await fetch(
      `https://${AZURE_REGION}.tts.speech.microsoft.com/cognitiveservices/v1`,
      {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/ssml+xml',
          'X-Microsoft-OutputFormat': 'audio-16khz-128kbitrate-mono-mp3'
        },
        body: ssml
      }
    );
    const blob = await audioRes.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.play();
  } catch(e) {
    console.error('TTS error:', e);
  }
}

function getToday() {
  return new Date().toISOString().slice(0,10);
}

function loadStats() {
  try { return JSON.parse(localStorage.getItem('jp_stats') || '{}'); }
  catch(e) { return {}; }
}
function saveStats(stats) {
  localStorage.setItem('jp_stats', JSON.stringify(stats));
}

function recordAnswer(isCorrect) {
  const stats = loadStats();
  const today = getToday();
  if (!stats[today]) stats[today] = {correct:0, total:0};
  stats[today].total++;
  if (isCorrect) stats[today].correct++;
  saveStats(stats);
}

function selectLevel(idx) {
  const unlockedUpTo = getUnlockedLevel();
  if (idx > unlockedUpTo) return;

  currentLevel = idx;
  WORDS = LEVELS[idx].words;
  usedWords = []; totalShown = 0;
  levelCorrect = 0; levelTotal = 0;
  correctCount = 0; wrongCount = 0; streakCount = 0; combo = 0;

  updateCombo();
  updateScore();
  document.getElementById('level-label').textContent = 'Lv.' + (idx+1);
  toggleLevel();
  loadQuestion();
}

function toggleLevel() {
  const panel = document.getElementById('level-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderLevelPanel();
}

function renderLevelPanel() {
  const p = loadProgress();
  const unlockedUpTo = getUnlockedLevel();
  const list = document.getElementById('level-list');
  
  list.innerHTML = LEVELS.map((lv, i) => {
    const key = 'level_' + i;
    const data = p[key] || {correct:0, total:0, passed:false};
    const locked = i > unlockedUpTo;
    const isActive = i === currentLevel;
    const pct = data.total > 0 ? Math.round(data.correct/data.total*100) : 0;
    
    let badgeText = locked ? '🔒 잠금' : data.passed ? '✅ 통과' : isActive ? '진행중' : '도전';
    let badgeClass = locked ? 'locked-badge' : data.passed ? '' : isActive ? 'active-badge' : '';

    return `<div class="level-card ${locked?'locked':''} ${isActive?'active-level':''}" onclick="${locked?'':'selectLevel('+i+')'}">
      <div class="level-card-top">
        <div class="level-name">${lv.name} <span style="font-size:13px;color:#aaa;font-weight:400">(${lv.words.length}단어)</span></div>
        <div class="level-badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="level-progress-wrap">
        <div class="level-progress-bar" style="width:${data.passed?100:pct}%"></div>
      </div>
      <div class="level-meta">${data.passed ? '정답률 ' + pct + '%로 통과!' : data.total > 0 ? '정답률 ' + pct + '% (' + data.correct + '/' + data.total + ')' : '아직 시작 전'}</div>
    </div>`;
  }).join('');
}

function checkLevelPass() {
  if (levelTotal < PASS_MIN) return;
  const rate = levelCorrect / levelTotal;
  if (rate >= PASS_RATE) {
    const p = loadProgress();
    const key = 'level_' + currentLevel;
    if (!p[key]) p[key] = {};
    if (!p[key].passed) {
      p[key].passed = true;
      p[key].correct = levelCorrect;
      p[key].total = levelTotal;
      saveProgress(p);

      if (currentLevel < LEVELS.length - 1) {
        setTimeout(() => {
          if (confirm(`🎉 Level ${currentLevel+1} 통과!\n정답률 ${Math.round(rate*100)}%\n\nLevel ${currentLevel+2}가 열렸어요! 이동할까요?`)) {
            selectLevel(currentLevel + 1);
          }
        }, 500);
      } else {
        setTimeout(() => alert('🏆 모든 레벨 완료! 정말 대단해요!'), 500);
      }
    }
  }
}

function toggleStats() {
  const panel = document.getElementById('stats-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderStats();
}

function renderStats() {
  const stats = loadStats();
  const today = getToday();
  const todayData = stats[today] || {correct:0, total:0};

  document.getElementById('today-correct').textContent = todayData.correct;
  document.getElementById('today-total').textContent = todayData.total;

  const list = document.getElementById('stats-list');
  const days = Object.keys(stats).sort((a,b)=>b.localeCompare(a));

  if (days.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#aaa;font-size:14px;padding:20px">아직 기록이 없어요</div>';
    return;
  }

  list.innerHTML = days.map(day => {
    const d = stats[day];
    const pct = d.total > 0 ? Math.round(d.correct/d.total*100) : 0;
    const dateLabel = day === today ? '오늘' : day.slice(5).replace('-', '/');
    return `<div class="stats-row">
      <div class="stats-date">${dateLabel}</div>
      <div class="stats-right">
        <div class="stats-bar-wrap"><div class="stats-bar" style="width:${pct}%"></div></div>
        <div class="stats-correct">${d.correct}정답</div>
        <div class="stats-total">${d.total}문제</div>
      </div>
    </div>`;
  }).join('');
}

function setMode(m, el) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  updateInstruction();
  loadQuestion();
}

function updateInstruction() {
  const map = {
    hira2meaning: '히라가나의 뜻을 고르세요',
    meaning2hira: '뜻에 맞는 히라가나를 고르세요',
    kanji2hira: '한자의 읽기(히라가나)를 고르세요'
  };
  document.getElementById('instruction').textContent = map[mode];
}

function getRandom(exclude, n) {
  return WORDS.filter(w => w !== exclude)
              .sort(() => Math.random() - 0.5)
              .slice(0, n);
}

function loadQuestion() {
  answered = false;
  document.getElementById('result-bar').className = '';
  document.getElementById('result-bar').style.display = 'none';
  document.getElementById('main-card').className = '';
  document.getElementById('word-sub').style.display = 'none';
  document.getElementById('word-romaji').style.display = 'none';
  document.getElementById('speak-btn').className = '';

  if (usedWords.length >= WORDS.length) usedWords = [];

  const pool = WORDS.filter(w => !usedWords.includes(w));
  currentWord = pool[Math.floor(Math.random() * pool.length)];
  usedWords.push(currentWord);
  totalShown++;

  updateProgress();
  currentChoices = [...getRandom(currentWord, 3), currentWord].sort(() => Math.random() - 0.5);

  renderCard();
  renderChoices();
}

function renderCard() {
  const mainEl = document.getElementById('word-main');
  const catEl = document.getElementById('card-category');
  const romajiEl = document.getElementById('word-romaji');

  mainEl.style.fontFamily = "'Noto Sans JP', sans-serif";
  romajiEl.style.display = 'none';

  if (mode === 'hira2meaning') {
    mainEl.textContent = currentWord.reading;
    mainEl.style.fontSize = currentWord.reading.length > 5 ? '34px' : '46px';
    catEl.textContent = currentWord.category;
  } else if (mode === 'meaning2hira') {
    mainEl.textContent = currentWord.meaning;
    mainEl.style.fontSize = '34px';
    mainEl.style.fontFamily = "'Noto Sans KR', sans-serif";
    catEl.textContent = '→ 히라가나';
  } else {
    mainEl.textContent = currentWord.kanji;
    mainEl.style.fontSize = currentWord.kanji.length > 2 ? '36px' : '52px';
    catEl.textContent = currentWord.category;
  }
}

function renderChoices() {
  const c = document.getElementById('choices');
  c.innerHTML = '';

  currentChoices.forEach(word => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = (mode === 'hira2meaning') ? word.meaning : word.reading;
    if (mode === 'hira2meaning') btn.style.fontFamily = "'Noto Sans KR',sans-serif";
    btn.onclick = () => handleAnswer(word, btn);
    c.appendChild(btn);
  });
}

function handleAnswer(chosen, btn) {
  if (answered) return;
  answered = true;

  const isCorrect = chosen === currentWord;
  const card = document.getElementById('main-card');
  const rb = document.getElementById('result-bar');

  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    const txt = b.textContent;
    const bWord = currentChoices.find(w => 
      mode==='hira2meaning' ? w.meaning===txt : w.reading===txt
    );
    if (bWord === currentWord) b.classList.add('correct-ans');
    else if (bWord === chosen && !isCorrect) b.classList.add('wrong-ans');
  });

  if (isCorrect) {
    combo++; streakCount++; correctCount++;
    levelCorrect++; levelTotal++;
    recordAnswer(true);
    checkLevelPass();

    card.classList.add('correct');
    rb.className = 'show correct-bar';
    document.getElementById('result-label').textContent = combo >= 5 ? `콤보 x${combo}! 완벽해요!` : '완벽해요!';
    document.getElementById('result-meaning').textContent = `${currentWord.reading}（${currentWord.kanji}） = ${currentWord.meaning}`;
    
    const sb = document.getElementById('speak-btn');
    sb.className = 'visible';
    sb.textContent = '🔊 다시 듣기';
  } else {
    combo = 0; streakCount = 0; wrongCount++;
    levelTotal++;
    recordAnswer(false);

    card.classList.add('wrong');
    rb.className = 'show wrong-bar';
    document.getElementById('result-label').textContent = '틀렸어요';
    document.getElementById('result-meaning').textContent = `정답: ${currentWord.reading}（${currentWord.kanji}） = ${currentWord.meaning}`;
    
    const sb = document.getElementById('speak-btn');
    sb.className = 'visible wrong-speak';
    sb.textContent = '🔊 정답 듣기';
  }

  if (mode === 'kanji2hira') {
    document.getElementById('word-sub').textContent = currentWord.reading;
    document.getElementById('word-sub').style.display = 'block';
  }

  document.getElementById('word-romaji').textContent = currentWord.romaji;
  document.getElementById('word-romaji').style.display = 'block';

  rb.style.display = 'flex';
  updateCombo();
  updateScore();

  speakWord();
}

function nextQuestion() {
  const card = document.getElementById('main-card');
  card.classList.add('fly-left');
  setTimeout(() => {
    card.classList.remove('fly-left');
    loadQuestion();
  }, 350);
}

function updateProgress() {
  const progress = Math.min((totalShown % 20) / 20 * 100, 100);
  document.getElementById('progress-bar').style.width = progress + '%';
}

function updateCombo() {
  document.getElementById('combo-num').textContent = combo;
  document.getElementById('combo-badge').style.display = combo >= 3 ? 'block' : 'none';
}

function updateScore() {
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = wrongCount;
  document.getElementById('streak-count').textContent = streakCount;
}

// 초기화
currentLevel = getUnlockedLevel();
WORDS = LEVELS[currentLevel].words;
document.getElementById("level-label").textContent = "Lv." + (currentLevel + 1);
updateInstruction();
loadQuestion();
</script>
